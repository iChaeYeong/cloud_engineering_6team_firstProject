name: Build and Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment by branch
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "OVERLAY=prod"      >> $GITHUB_ENV
            echo "NAMESPACE=prod"    >> $GITHUB_ENV
            echo "IMAGE_TAG=latest"  >> $GITHUB_ENV
          else
            echo "OVERLAY=dev"       >> $GITHUB_ENV
            echo "NAMESPACE=dev"     >> $GITHUB_ENV
            echo "IMAGE_TAG=dev"     >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          platforms: linux/amd64
          push: true
          tags: moonjh1/bank-frontend:${{ env.IMAGE_TAG }}
          cache-from: type=local,src=/tmp/buildcache/frontend
          cache-to: type=local,dest=/tmp/buildcache/frontend,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          platforms: linux/amd64
          push: true
          tags: moonjh1/bank-backend:${{ env.IMAGE_TAG }}
          cache-from: type=local,src=/tmp/buildcache/backend
          cache-to: type=local,dest=/tmp/buildcache/backend,mode=max

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k mainfests/overlays/${{ env.OVERLAY }}/
          kubectl rollout restart deployment/frontend -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/springboot -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/springboot -n ${{ env.NAMESPACE }}
