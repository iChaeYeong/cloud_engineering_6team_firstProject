apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv-prod
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-storage
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    name: mysql-pvc
    namespace: prod
  nfs:
    server: 172.16.8.20
    path: /nfs/data/prod
