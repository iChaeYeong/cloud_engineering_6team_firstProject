apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv-dev
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-storage
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    name: mysql-pvc
    namespace: dev
  nfs:
    server: 172.16.8.20
    path: /nfs/data/dev
